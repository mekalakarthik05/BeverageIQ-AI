<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0B1020" rx="15" />
  
  <defs>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#6D28D9" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2DD4BF" />
      <stop offset="100%" stop-color="#0F766E" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="50" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC" text-anchor="middle">BeverageIQ Architecture</text>

  <!-- Nodes -->
  <g transform="translate(100, 100)">
    <rect width="180" height="60" rx="10" fill="#161B2F" stroke="#8B5CF6" stroke-width="2" filter="url(#glow)"/>
    <text x="90" y="35" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">User Query</text>
  </g>

  <g transform="translate(100, 250)">
    <rect width="180" height="60" rx="10" fill="#161B2F" stroke="#2DD4BF" stroke-width="2"/>
    <text x="90" y="35" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Streamlit UI</text>
  </g>

  <g transform="translate(100, 400)">
    <rect width="180" height="60" rx="10" fill="#161B2F" stroke="#8B5CF6" stroke-width="2"/>
    <text x="90" y="35" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Intent Parser</text>
  </g>

  <g transform="translate(400, 100)">
    <rect width="180" height="60" rx="10" fill="#161B2F" stroke="#F43F5E" stroke-width="2"/>
    <text x="90" y="35" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">SQLite Database</text>
  </g>

  <g transform="translate(400, 250)">
    <rect width="180" height="60" rx="10" fill="#161B2F" stroke="#2DD4BF" stroke-width="2"/>
    <text x="90" y="35" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Pandas Analytics</text>
  </g>

  <g transform="translate(400, 400)">
    <rect width="180" height="60" rx="10" fill="#161B2F" stroke="#8B5CF6" stroke-width="2" filter="url(#glow)"/>
    <text x="90" y="35" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Ollama LLM (Llama 3)</text>
  </g>

  <!-- Edges -->
  <path d="M 190 160 L 190 250" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="5,5"/>
  <path d="M 190 310 L 190 400" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  
  <path d="M 280 430 Q 340 430 340 280 T 400 130" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 490 160 L 490 250" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 490 310 L 490 400" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

</svg>
