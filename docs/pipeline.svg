<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0B1020" rx="15" />
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="50" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC" text-anchor="middle">Data Pipeline</text>

  <!-- Nodes (Vertical Pipeline) -->
  <g transform="translate(250, 80)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#94A3B8" stroke-width="2"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Natural Language Input</text>
  </g>

  <g transform="translate(250, 150)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#2DD4BF" stroke-width="2"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Intent &amp; Entity Detection</text>
  </g>

  <g transform="translate(250, 220)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#8B5CF6" stroke-width="2"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Dynamic SQL Generation</text>
  </g>

  <g transform="translate(250, 290)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#F43F5E" stroke-width="2"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Pandas Data Aggregation</text>
  </g>

  <g transform="translate(250, 360)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#2DD4BF" stroke-width="2"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Plotly Visualization Engine</text>
  </g>

  <g transform="translate(250, 430)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#8B5CF6" stroke-width="2" filter="url(#glow)"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">Ollama LLM Insight Generation</text>
  </g>

  <g transform="translate(250, 500)">
    <rect width="300" height="40" rx="20" fill="#161B2F" stroke="#EAB308" stroke-width="2"/>
    <text x="150" y="25" font-family="Helvetica" font-size="16" fill="#F8FAFC" text-anchor="middle">ReportLab Executive PDF</text>
  </g>

  <!-- Vertical Arrows -->
  <path d="M 400 120 L 400 150" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 400 190 L 400 220" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 400 260 L 400 290" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 400 330 L 400 360" stroke="#F43F5E" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 400 400 L 400 430" stroke="#2DD4BF" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 400 470 L 400 500" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

</svg>
