<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0B1020" rx="15" />
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="50" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC" text-anchor="middle">UI &amp; Module Overview</text>

  <!-- Sidebar -->
  <rect x="50" y="100" width="200" height="400" rx="10" fill="#161B2F" stroke="#8B5CF6" stroke-width="2"/>
  <text x="150" y="130" font-family="Helvetica" font-size="18" fill="#F8FAFC" text-anchor="middle" font-weight="bold">Navigation</text>
  
  <text x="80" y="170" font-family="Helvetica" font-size="14" fill="#2DD4BF">🏠 Executive Dash</text>
  <text x="80" y="200" font-family="Helvetica" font-size="14" fill="#2DD4BF">💬 Analytics Chat</text>
  <text x="80" y="230" font-family="Helvetica" font-size="14" fill="#94A3B8">📊 Sales Analytics</text>
  <text x="80" y="260" font-family="Helvetica" font-size="14" fill="#94A3B8">🎯 Promotion Analytics</text>
  <text x="80" y="290" font-family="Helvetica" font-size="14" fill="#94A3B8">📦 Inventory Analytics</text>
  <text x="80" y="320" font-family="Helvetica" font-size="14" fill="#94A3B8">🌟 Product Analytics</text>
  <text x="80" y="350" font-family="Helvetica" font-size="14" fill="#94A3B8">🌍 Regional Analytics</text>
  <text x="80" y="380" font-family="Helvetica" font-size="14" fill="#94A3B8">📈 Trend Analytics</text>
  <text x="80" y="410" font-family="Helvetica" font-size="14" fill="#94A3B8">🗄️ Data Explorer</text>
  <text x="80" y="440" font-family="Helvetica" font-size="14" fill="#94A3B8">⚙️ System Status</text>
  <text x="80" y="470" font-family="Helvetica" font-size="14" fill="#94A3B8">🔧 Settings</text>

  <!-- Main View -->
  <rect x="280" y="100" width="470" height="400" rx="10" fill="#101427" stroke="#2DD4BF" stroke-width="2"/>
  
  <!-- Header inside main view -->
  <rect x="300" y="120" width="430" height="50" rx="5" fill="#161B2F" stroke="#8B5CF6" stroke-width="1"/>
  <text x="320" y="150" font-family="Helvetica" font-size="18" fill="#F8FAFC">Page Title</text>
  <rect x="600" y="130" width="120" height="30" rx="15" fill="#8B5CF6" stroke="#8B5CF6"/>
  <text x="660" y="150" font-family="Helvetica" font-size="12" fill="#F8FAFC" text-anchor="middle">Prepare PDF</text>

  <!-- KPI Grid -->
  <rect x="300" y="190" width="100" height="60" rx="5" fill="#161B2F"/>
  <rect x="410" y="190" width="100" height="60" rx="5" fill="#161B2F"/>
  <rect x="520" y="190" width="100" height="60" rx="5" fill="#161B2F"/>
  <rect x="630" y="190" width="100" height="60" rx="5" fill="#161B2F"/>
  
  <!-- Charts -->
  <rect x="300" y="270" width="260" height="210" rx="5" fill="#161B2F" stroke="#2DD4BF" stroke-width="1"/>
  <circle cx="430" cy="370" r="40" fill="none" stroke="#8B5CF6" stroke-width="20"/>
  
  <rect x="580" y="270" width="150" height="210" rx="5" fill="#161B2F" stroke="#F43F5E" stroke-width="1"/>
  <rect x="600" y="420" width="20" height="40" fill="#F43F5E"/>
  <rect x="630" y="380" width="20" height="80" fill="#2DD4BF"/>
  <rect x="660" y="310" width="20" height="150" fill="#8B5CF6"/>
  <rect x="690" y="340" width="20" height="120" fill="#EAB308"/>

</svg>
