<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#0B1020" rx="15" />
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="400" y="50" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#F8FAFC" text-anchor="middle">BeverageIQ End-to-End Workflow</text>

  <g transform="translate(50, 100)">
    <rect width="150" height="400" rx="10" fill="#161B2F" stroke="#94A3B8" stroke-width="2"/>
    <text x="75" y="40" font-family="Helvetica" font-size="18" fill="#F8FAFC" text-anchor="middle" font-weight="bold">User</text>
    <text x="75" y="100" font-family="Helvetica" font-size="14" fill="#94A3B8" text-anchor="middle">Asks</text>
    <text x="75" y="125" font-family="Helvetica" font-size="12" fill="#2DD4BF" text-anchor="middle">"Top 5 products"</text>
    <text x="75" y="300" font-family="Helvetica" font-size="14" fill="#94A3B8" text-anchor="middle">Receives</text>
    <text x="75" y="325" font-family="Helvetica" font-size="12" fill="#8B5CF6" text-anchor="middle">AI Insights &amp; PDF</text>
  </g>

  <g transform="translate(250, 100)">
    <rect width="250" height="400" rx="10" fill="#161B2F" stroke="#8B5CF6" stroke-width="2"/>
    <text x="125" y="40" font-family="Helvetica" font-size="18" fill="#F8FAFC" text-anchor="middle" font-weight="bold">Streamlit Engine</text>
    
    <rect x="25" y="80" width="200" height="50" rx="5" fill="#0B1020" stroke="#2DD4BF" stroke-width="1"/>
    <text x="125" y="110" font-family="Helvetica" font-size="14" fill="#F8FAFC" text-anchor="middle">Intent Parser</text>
    
    <rect x="25" y="160" width="200" height="50" rx="5" fill="#0B1020" stroke="#2DD4BF" stroke-width="1"/>
    <text x="125" y="190" font-family="Helvetica" font-size="14" fill="#F8FAFC" text-anchor="middle">Pandas Aggregation</text>
    
    <rect x="25" y="240" width="200" height="50" rx="5" fill="#0B1020" stroke="#2DD4BF" stroke-width="1"/>
    <text x="125" y="270" font-family="Helvetica" font-size="14" fill="#F8FAFC" text-anchor="middle">Plotly Visualization</text>
    
    <rect x="25" y="320" width="200" height="50" rx="5" fill="#0B1020" stroke="#F43F5E" stroke-width="1"/>
    <text x="125" y="350" font-family="Helvetica" font-size="14" fill="#F8FAFC" text-anchor="middle">ReportLab PDF Export</text>
  </g>

  <g transform="translate(550, 100)">
    <rect width="180" height="180" rx="10" fill="#161B2F" stroke="#F43F5E" stroke-width="2"/>
    <text x="90" y="40" font-family="Helvetica" font-size="18" fill="#F8FAFC" text-anchor="middle" font-weight="bold">Database</text>
    <text x="90" y="90" font-family="Helvetica" font-size="14" fill="#94A3B8" text-anchor="middle">SQLite</text>
    <text x="90" y="120" font-family="Helvetica" font-size="12" fill="#2DD4BF" text-anchor="middle">Stores, Sales</text>
    <text x="90" y="140" font-family="Helvetica" font-size="12" fill="#2DD4BF" text-anchor="middle">Products, Inv</text>
  </g>

  <g transform="translate(550, 320)">
    <rect width="180" height="180" rx="10" fill="#161B2F" stroke="#8B5CF6" stroke-width="2" filter="url(#glow)"/>
    <text x="90" y="40" font-family="Helvetica" font-size="18" fill="#F8FAFC" text-anchor="middle" font-weight="bold">Ollama LLM</text>
    <text x="90" y="90" font-family="Helvetica" font-size="14" fill="#94A3B8" text-anchor="middle">Llama 3.2</text>
    <text x="90" y="120" font-family="Helvetica" font-size="12" fill="#8B5CF6" text-anchor="middle">Zero Temperature</text>
    <text x="90" y="140" font-family="Helvetica" font-size="12" fill="#8B5CF6" text-anchor="middle">Business Context</text>
  </g>

  <!-- Flow Arrows -->
  <path d="M 200 210 L 250 210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 500 190 L 550 190" stroke="#F43F5E" stroke-width="2" marker-end="url(#arrow)" fill="none"/>
  <path d="M 500 410 L 550 410" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

</svg>
